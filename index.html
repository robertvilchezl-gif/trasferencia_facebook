<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛰️ Confirmación de acceso 🛰️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="rosa">

<button class="modo" onclick="cambiarModo()">🌙 / 🌸</button>

<div class="sobre" id="sobre" onclick="abrirCarta()">
    <div class="tapa"></div>

    <div class="carta">
        <h1 class="titulo">🛰️ Confirmación de acceso 🛰️</h1>
        <h2 class="nombre" id="nombre"></h2>

        <p id="mensaje" class="mensaje"></p>

        <button onclick="sorpresa()">💝 Ver sorpresa</button>

        <p id="oculto" class="oculto">
            Gracias por entrar a este sitio 💖<br>
            Tu visita fue registrada correctamente.
        </p>

        <p class="firma">
            Atentamente,<br>
            tu Mecatrónico Favorito ⚙️💖
        </p>
    </div>
</div>

<!-- 🪟 Mensaje de bienvenida -->
<div id="bienvenida" class="bienvenida">
  <div class="bienvenida-contenido">
    <p>
      Gracias por ingresar a este sitio web 💖<br>
      Tu acceso fue verificado correctamente. A continuación se muestra información relevante para ti.
    </p>
    <button onclick="cerrarBienvenida()">Entrar</button>
  </div>
</div>

<script src="script.js"></script>
</body>

</html>
